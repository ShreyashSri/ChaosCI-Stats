apiVersion: v1
kind: Service
metadata:
  name: chaosci-api
  namespace: chaosci-system
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: chaosci-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaosci-api
  namespace: chaosci-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaosci-api
  template:
    metadata:
      labels:
        app: chaosci-api
    spec:
      containers:
      - name: api
        image: chaosci/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: DATABASE_URL
          value: "postgres://chaos:password@postgres:5432/chaosci?sslmode=disable"
